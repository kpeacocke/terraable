---
# EDA event source: HTTP webhook receiver for compliance drift events.
# Listens on the configured port and emits events to the rulebook engine.
#
# Event payload expected (JSON):
#   {
#     "event_type": "compliance_drift",
#     "control": "ssh_root_login" | "portal_service_health",
#     "status": "fail",
#     "environment": "<environment_name>",
#     "target_group": "<ansible_inventory_group>"
#   }
#
# Usage in a rulebook sources block:
#   - ansible.eda.webhook:
#       host: 0.0.0.0
#       port: "{{ eda_webhook_port | default(5000) }}"

plugin: ansible.eda.webhook
host: 0.0.0.0
port: 5000
