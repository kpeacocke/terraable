---
- name: Service health drift scenario
  hosts: "{{ connection.ansible_inventory_group | default(target_group | default('all')) }}"
  gather_facts: false
  vars:
    drift_mode: "{{ drift_action | default('inject') }}"
    target_service: "{{ portal_service | default('backstage') }}"
  tasks:
    - name: Inject service health drift — stop the portal service
      when: drift_mode == 'inject'
      block:
        - name: Stop portal service to simulate health drift
          ansible.builtin.service:
            name: "{{ target_service }}"
            state: stopped
          become: true
          register: service_stopped
          ignore_errors: true

        - name: Record drift injection evidence
          set_fact:
            service_drift_status: "drifted"
            service_drift_evidence: >-
              Service {{ target_service }} stopped to simulate health drift.
              rc={{ service_stopped.rc | default('n/a') }}

        - name: Emit drift injection summary
          debug:
            msg: "{{ service_drift_evidence }}"

    - name: Remediate service health drift — restore portal service
      when: drift_mode == 'remediate'
      block:
        - name: Start portal service to restore approved state
          ansible.builtin.service:
            name: "{{ target_service }}"
            state: started
            enabled: true
          become: true
          register: service_started

        - name: Record remediation evidence
          set_fact:
            service_drift_status: "remediated"
            service_drift_evidence: >-
              Service {{ target_service }} restored to running state.
              changed={{ service_started.changed }}

        - name: Emit remediation summary
          debug:
            msg: "{{ service_drift_evidence }}"

    - name: Validate portal service health
      when: drift_mode == 'validate'
      block:
        - name: Check portal service state
          ansible.builtin.command: systemctl is-active "{{ target_service }}"
          register: service_check
          become: true
          changed_when: false
          failed_when: false

        - name: Set service health facts
          set_fact:
            service_health_status: >-
              {{ 'pass' if service_check.stdout | default('') == 'active' else 'fail' }}
            service_health_evidence: >-
              Service {{ target_service }} status: {{ service_check.stdout | default('unknown') }}

        - name: Emit scan result
          copy:
            dest: "{{ scan_output_path | default('/tmp/terraable-service-scan.json') }}"
            content: >-
              {{ {
                'control': 'portal_service_health',
                'service': target_service,
                'status': service_health_status,
                'evidence': service_health_evidence
              } | to_json }}
            mode: "{{ scan_output_mode | default('0600') }}"
