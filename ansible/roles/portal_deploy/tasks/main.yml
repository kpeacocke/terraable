- name: Deploy Backstage path in local-lab mode
  when:
    - lab_mode | default(false) | bool
    - portal_impl == 'backstage'
  block:
    - name: Record deployed portal implementation
      copy:
        dest: "{{ portal_release_path }}"
        content: "portal=backstage\nmode=local-lab\n"
        mode: "0600"

    - name: Mark portal service as active
      copy:
        dest: "{{ service_state_path }}"
        content: "active\n"
        mode: "0600"

- name: Deploy RHDH path in local-lab mode
  when:
    - lab_mode | default(false) | bool
    - portal_impl == 'rhdh'
  block:
    - name: Record deployed portal implementation
      copy:
        dest: "{{ portal_release_path }}"
        content: "portal=rhdh\nmode=local-lab\n"
        mode: "0600"

    - name: Mark portal service as active
      copy:
        dest: "{{ service_state_path }}"
        content: "active\n"
        mode: "0600"

- name: Deploy RHDH path
  debug:
    msg: "Deploying Red Hat Developer Hub path"
  when:
    - not (lab_mode | default(false) | bool)
    - portal_impl == 'rhdh'

- name: Deploy Backstage path
  debug:
    msg: "Deploying Backstage path"
  when:
    - not (lab_mode | default(false) | bool)
    - portal_impl == 'backstage'
