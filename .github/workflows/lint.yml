name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@<checkout-v4-commit-sha> # v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@<shellcheck-2-0-0-commit-sha> # 2.0.0

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@<checkout-v4-commit-sha> # v4

      - name: Run Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@<markdownlint-v19-commit-sha> # v19
