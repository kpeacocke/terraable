name: Docs sanity

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/docs.yml'

jobs:
  markdown-links:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check
        uses: gaurav-nelson/github-action-markdown-link-check@b5bcfddb2ab210afc05ccc0c122973ea7605f4ca # v1
        with:
          use-quiet-mode: yes
          config-file: .mlc_config.json
