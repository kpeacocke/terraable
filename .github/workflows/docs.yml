name: Docs sanity

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/docs.yml'

jobs:
  markdown-links:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Link check
        uses: gaurav-nelson/github-action-markdown-link-check@0524e79d8d7d1606112722dd7a3b5f5ce367de3e # latest commit (2026-03-18)
        with:
          use-quiet-mode: yes
          config-file: .mlc_config.json
