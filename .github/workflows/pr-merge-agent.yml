name: PR merge agent

# Monitors all open PRs and merges each one once:
#   1. All review threads are resolved,
#   2. The Copilot review gate is green on the current head, and
#   3. Every check run on the current head has completed successfully.
#
# Between checks it re-requests a Copilot review so the gate can advance.
# Runs on PR activity, review activity, completed check runs, and a schedule.

"on":
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  check_run:
    types:
      - completed
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      merge_method:
        description: "Merge method: squash | merge | rebase"
        required: false
        default: squash

permissions:
  checks: read
  contents: write
  pull-requests: write

jobs:
  monitor-and-merge:
    name: Monitor PRs and merge when clean
    runs-on: ubuntu-latest
    concurrency:
      group: pr-merge-agent-${{ github.repository }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      OWNER: ${{ github.repository_owner }}

    steps:
      - name: Resolve candidate PRs
        id: prs
        run: |
          case "${{ github.event_name }}" in
            pull_request_target|pull_request_review)
              echo 'numbers=[${{ github.event.pull_request.number }}]' >> "$GITHUB_OUTPUT"
              ;;
            check_run)
              if [[ "${{ github.event.check_run.name }}" == "Monitor PRs and merge when clean" ]]; then
                echo 'numbers=[]' >> "$GITHUB_OUTPUT"
                exit 0
              fi
              HEAD_SHA="${{ github.event.check_run.head_sha }}"
              PR_NUMBERS=$(gh pr list \
                --repo "$REPO" \
                --state open \
                --limit 200 \
                --json number,headRefOid \
                --jq 'map(select(.headRefOid == "'"$HEAD_SHA"'") | .number)')
              echo "numbers=${PR_NUMBERS}" >> "$GITHUB_OUTPUT"
              ;;
            schedule|workflow_dispatch)
              PR_NUMBERS=$(gh pr list \
                --repo "$REPO" \
                --state open \
                --limit 200 \
                --json number \
                --jq 'map(.number)')
              echo "numbers=${PR_NUMBERS}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'numbers=[]' >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Skip if no candidate PRs
        if: steps.prs.outputs.numbers == '[]'
        run: |
          echo "No candidate PRs found for this event."

      - name: Evaluate candidate PRs and act
        if: steps.prs.outputs.numbers != '[]'
        env:
          MERGE_METHOD: ${{ inputs.merge_method || 'squash' }}
          PR_NUMBERS_JSON: ${{ steps.prs.outputs.numbers }}
        run: |
          python3 <<'PY' > pr-numbers.txt
          import json
          import os

          for number in json.loads(os.environ["PR_NUMBERS_JSON"]):
              print(number)
          PY

          while IFS= read -r PR_NUMBER; do
            [[ -n "$PR_NUMBER" ]] || continue

            PR_STATE=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.state')
            PR_DRAFT=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.draft')
            if [[ "$PR_STATE" != "open" ]]; then
              echo "PR #$PR_NUMBER is no longer open; skipping."
              continue
            fi
            if [[ "$PR_DRAFT" == "true" ]]; then
              echo "PR #$PR_NUMBER is a draft; skipping."
              continue
            fi

            HEAD_SHA=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.head.sha')
            echo "Evaluating PR #$PR_NUMBER head=$HEAD_SHA"

            REVIEW_DATA=$(gh api graphql \
              -f query='query($owner:String!,$repo:String!,$pr:Int!){repository(owner:$owner,name:$repo){pullRequest(number:$pr){reviewDecision reviewThreads(first:100){nodes{isResolved}}}}}' \
              -f owner="$OWNER" \
              -f repo="${REPO#*/}" \
              -F pr="$PR_NUMBER")
            UNRESOLVED=$(REVIEW_DATA="$REVIEW_DATA" python3 <<'PY'
          import json
          import os

          data = json.loads(os.environ["REVIEW_DATA"])["data"]["repository"]["pullRequest"]
          print(sum(1 for node in data["reviewThreads"]["nodes"] if not node["isResolved"]))
          PY
            )
            REVIEW_DECISION=$(REVIEW_DATA="$REVIEW_DATA" python3 <<'PY'
          import json
          import os

          data = json.loads(os.environ["REVIEW_DATA"])["data"]["repository"]["pullRequest"]
          print(data.get("reviewDecision") or "NONE")
          PY
            )

            CHECK_DATA=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs")
            CHECK_SUMMARY=$(CHECK_DATA="$CHECK_DATA" python3 <<'PY'
          import json
          import os

          payload = json.loads(os.environ["CHECK_DATA"])
          check_runs = payload.get("check_runs", [])
          allowed = {"success", "neutral", "skipped"}
          all_passed = "true"
          copilot = "missing"

          if not check_runs:
              all_passed = "false"

          for run in check_runs:
              name = run.get("name", "")
              status = run.get("status", "unknown")
              conclusion = str(run.get("conclusion", "none"))
              if name == "Copilot review present":
                  copilot = f"{status}:{conclusion}"
              if status != "completed" or conclusion not in allowed:
                  all_passed = "false"

          print(all_passed)
          print(copilot)
          PY
            )
            ALL_CHECKS_PASSED=$(printf '%s' "$CHECK_SUMMARY" | sed -n '1p')
            COPILOT=$(printf '%s' "$CHECK_SUMMARY" | sed -n '2p')

            echo "  unresolved_threads=$UNRESOLVED"
            echo "  review_decision=$REVIEW_DECISION"
            echo "  all_checks_passed=$ALL_CHECKS_PASSED"
            echo "  copilot_gate=$COPILOT"

            if [[ "$UNRESOLVED" == "0" && "$REVIEW_DECISION" != "CHANGES_REQUESTED" && "$ALL_CHECKS_PASSED" == "true" && "$COPILOT" == "completed:success" ]]; then
              echo "Merging PR #$PR_NUMBER via $MERGE_METHOD"
              gh pr merge "$PR_NUMBER" --repo "$REPO" "--${MERGE_METHOD}" || true
              continue
            fi

            if [[ "$UNRESOLVED" == "0" && "$COPILOT" != "completed:success" ]]; then
              echo "Re-requesting Copilot review for PR #$PR_NUMBER"
              gh api -X POST "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
                -f "reviewers[]=github-copilot[bot]" 2>&1 || true
            fi

            echo "PR #$PR_NUMBER not ready yet; leaving it for the next cycle."
          done < pr-numbers.txt
