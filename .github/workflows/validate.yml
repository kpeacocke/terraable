name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-health:
    name: Repo health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required repository files
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f CODEOWNERS
          test -f .editorconfig
          test -f .gitignore
          test -f .gitattributes

  terraform-fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check formatting
        run: |
          if find . -type f -name '*.tf' | grep -q .; then
            terraform fmt -check -recursive
          else
            echo "No Terraform files found; skipping."
          fi

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
