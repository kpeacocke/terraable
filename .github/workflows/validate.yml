name: Validate

permissions:
  contents: read

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-health:
    name: Repo health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Verify required repository files
        run: |
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f CODEOWNERS
          test -f .editorconfig
          test -f .gitignore
          test -f .gitattributes
          test -f docs/architecture-overview.md
          test -f docs/handoff-contract.md
          test -f docs/hcp-terraform.md
          test -f docs/mvp-demo-runbook.md
          test -f docs/repository-labels.md
          test -f ui/index.html
          test -f terraform/modules/substrate_openshift/main.tf
          test -f ansible/playbooks/aap_operationalise.yml

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d  # v5
        with:
          python-version: "3.11"

      - name: Install Poetry and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry install --no-interaction --no-ansi --no-root

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: "1.9.5"

      - name: Run tests
        run: poetry run pytest -p no:pytest_terraform.plugin

  ui-regression-tests:
    name: UI regression tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8  # v4
        with:
          node-version: "20"

      - name: Run UI availability tests
        run: node --test ui/targetAvailability.test.mjs

  terraform-fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: "1.9.5"

      - name: Check formatting
        run: |
          if find . -type f -name '*.tf' | grep -q .; then
            terraform fmt -check -recursive
          else
            echo "No Terraform files found; skipping."
          fi

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3
        with:
          config_file: .yamllint.yml
