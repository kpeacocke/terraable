name: Task
description: Create a concrete implementation task
title: "[Task]: "
labels:
  - feature
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true

  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      placeholder: |
        - [ ] Deliverable 1
        - [ ] Deliverable 2
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
