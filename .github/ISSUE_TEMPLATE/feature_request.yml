name: Feature request
description: Propose a new capability or enhancement
title: "[Feature]: "
labels:
  - feature
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What are we trying to add?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / opportunity
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the implementation direction
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
