line-length = 100
target-version = "py311"
src = ["terraable", "tests"]

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "ARG",    # flake8-unused-arguments
    "RUF",    # Ruff-specific rules
    "PIE",    # flake8-pie
    "PT",     # flake8-pytest-style
    "SIM",    # flake8-simplify
]

ignore = [
    "E501",   # Line too long; ruff format will handle this
    "ARG001", # Unused function argument (common in callbacks)
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[lint.pydocstyle]
convention = "google"

[lint.isort]
known-first-party = ["terraable"]
